name: Build Arch-Cyclone ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          docker run --rm \
            --security-opt seccomp=unconfined \
            --cap-add=SYS_ADMIN \
            --device=/dev/loop-control:/dev/loop-control \
            --device=/dev/loop0:/dev/loop0 \
            --device=/dev/loop1:/dev/loop1 \
            --device=/dev/loop2:/dev/loop2 \
            --device=/dev/loop3:/dev/loop3 \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ubuntu:22.04 bash -c "
              apt-get update -qq && \
              apt-get install -y -qq archiso && \
              mkdir -p out && \
              mkarchiso -v -w out/work -o out Profile/
            "

      - name: Find ISO
        id: iso
        run: |
          ISO_FILE=$(ls -t out/*.iso 2>/dev/null | head -1)
          echo "iso_path=$ISO_FILE" >> "$GITHUB_OUTPUT"
          echo "iso_name=$(basename $ISO_FILE)" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-cyclone-iso
          path: ${{ steps.iso.outputs.iso_path }}
          retention-days: 14
          compression-level: 0
